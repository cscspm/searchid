<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>CSC ID Search — State Team</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
:root{
  --bg:#f0f2f7;--bg2:#ffffff;--bg3:#f7f8fc;--bg4:#eef0f6;
  --border:#e2e5ef;--border2:#d0d4e4;
  --accent:#4361ee;--accent2:#7c3aed;--accentl:#eef0fd;
  --ok:#059669;--okl:#d1fae5;
  --warn:#d97706;--warnl:#fef3c7;
  --danger:#dc2626;--dangerl:#fee2e2;
  --text:#1a1d2e;--text2:#6b7280;--text3:#9ca3af;
  --r:10px;--shadow:0 1px 3px rgba(0,0,0,.08);
  --shadow-md:0 4px 12px rgba(0,0,0,.08);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;font-size:14px;min-height:100vh;padding-bottom:30px;}

/* HEADER */
.header{background:linear-gradient(135deg,var(--accent) 0%,var(--accent2) 100%);padding:20px 20px 24px;color:#fff;text-align:center;}
.header h1{font-size:20px;font-weight:700;margin-bottom:4px;}
.header p{font-size:13px;opacity:.85;}
.conn-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.15);border-radius:20px;padding:4px 12px;font-size:12px;margin-top:10px;}
.conn-dot{width:7px;height:7px;border-radius:50%;background:#fff;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}
.conn-dot.offline{background:#fca5a5;animation:none;}
.conn-dot.online{background:#6ee7b7;animation:none;}

/* SEARCH CARD */
.search-card{background:var(--bg2);border-radius:var(--r);margin:16px;box-shadow:var(--shadow-md);padding:18px;}
.state-select{width:100%;background:var(--bg3);border:1.5px solid var(--border2);border-radius:8px;padding:12px 14px;font-size:15px;color:var(--text);font-family:inherit;outline:none;margin-bottom:12px;-webkit-appearance:none;}
.state-select:focus{border-color:var(--accent);}
.search-row{display:flex;gap:8px;}
.sinp{flex:1;background:var(--bg3);border:1.5px solid var(--border2);border-radius:8px;padding:13px 16px;color:var(--text);font-size:16px;font-family:inherit;outline:none;transition:border-color .15s;}
.sinp:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(67,97,238,.12);}
.sinp::placeholder{color:var(--text3);}
.btn-search{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:13px 18px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap;}
.btn-search:active{opacity:.85;}
.btn-dl{width:100%;background:var(--ok);color:#fff;border:none;border-radius:8px;padding:13px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;margin-top:12px;display:flex;align-items:center;justify-content:center;gap:8px;}
.btn-dl:active{opacity:.85;}
.btn-dl:disabled{opacity:.35;cursor:not-allowed;}

/* RESULT CARDS */
.result-area{padding:0 16px;}
.rcard{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px;margin-bottom:12px;box-shadow:var(--shadow);}
.rcard-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--text3);margin-bottom:12px;}
.rid{font-size:17px;font-weight:700;font-family:monospace;color:var(--text);}
.rname{font-size:13px;color:var(--text2);margin-top:2px;}
.status-row{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin:12px 0;}
.bpill{display:inline-block;padding:6px 16px;border-radius:20px;font-size:13px;font-weight:700;}
.bp-blocked{background:var(--dangerl);color:var(--danger);border:1px solid #fca5a5;}
.bp-unblocked{background:var(--okl);color:var(--ok);border:1px solid #6ee7b7;}
.bp-notfound{background:var(--bg4);color:var(--text2);border:1px solid var(--border2);}
.bp-fraud{background:var(--dangerl);color:var(--danger);border:2px solid var(--danger);}

.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
.field{background:var(--bg3);border-radius:7px;padding:10px 12px;border:1px solid var(--border);}
.fl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:4px;font-weight:600;}
.fv{font-size:13px;font-weight:600;color:var(--text);word-break:break-word;}
.pill{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;}
.pill-red{background:var(--dangerl);color:var(--danger);}
.pill-green{background:var(--okl);color:var(--ok);}
.pill-blue{background:#dbeafe;color:#1d4ed8;}
.pill-warn{background:var(--warnl);color:var(--warn);}
.pill-grey{background:var(--bg4);color:var(--text3);}

/* REASON BOX */
.reason-box{background:var(--dangerl);border:1px solid #fca5a5;border-radius:8px;padding:12px 14px;margin-top:10px;}
.reason-label{font-size:10px;font-weight:700;color:var(--danger);text-transform:uppercase;letter-spacing:.7px;margin-bottom:4px;}
.reason-text{font-size:13px;color:var(--danger);font-weight:500;line-height:1.5;}

/* FRAUD BOX */
.fraud-box{background:var(--dangerl);border:2px solid var(--danger);border-radius:8px;padding:14px;margin-top:10px;}
.fraud-head{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.fraud-title{font-size:14px;font-weight:700;color:var(--danger);}

/* HISTORY BOX */
.hist-box{background:var(--okl);border:1px solid #6ee7b7;border-radius:8px;padding:12px 14px;margin-top:10px;}
.hist-label{font-size:10px;font-weight:700;color:var(--ok);text-transform:uppercase;letter-spacing:.7px;margin-bottom:4px;}
.hist-text{font-size:13px;color:var(--ok);font-weight:600;}

/* STATS BAR */
.stats-bar{display:flex;gap:0;background:var(--bg2);border-bottom:1px solid var(--border);overflow-x:auto;}
.stat-item{flex:1;min-width:80px;padding:12px 10px;text-align:center;border-right:1px solid var(--border);}
.stat-item:last-child{border-right:none;}
.stat-val{font-size:18px;font-weight:700;color:var(--accent);}
.stat-lbl{font-size:10px;color:var(--text3);margin-top:2px;text-transform:uppercase;letter-spacing:.5px;}

/* EMPTY STATE */
.empty{text-align:center;padding:50px 20px;color:var(--text3);}
.empty svg{margin:0 auto 14px;display:block;opacity:.2;}
.empty p{font-size:13px;}

/* LOADING */
.loading{text-align:center;padding:30px;color:var(--text2);}
.spin{width:32px;height:32px;border:3px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px;}
@keyframes spin{to{transform:rotate(360deg);}}

/* SETUP OVERLAY */
.setup-overlay{position:fixed;inset:0;background:rgba(240,242,247,.97);z-index:999;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px);}
.setup-box{background:var(--bg2);border-radius:14px;padding:24px;max-width:400px;width:100%;box-shadow:var(--shadow-md);text-align:center;}
.setup-box h2{font-size:18px;font-weight:700;margin-bottom:8px;}
.setup-box p{font-size:13px;color:var(--text2);margin-bottom:16px;line-height:1.6;}
.setup-input{width:100%;background:var(--bg3);border:1.5px solid var(--border2);border-radius:8px;padding:12px 14px;font-size:15px;color:var(--text);font-family:inherit;outline:none;margin-bottom:10px;text-align:center;}
.setup-btn{width:100%;background:var(--accent);color:#fff;border:none;border-radius:8px;padding:13px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;}
.setup-msg{font-size:12px;margin-top:8px;min-height:16px;font-weight:500;}
</style>
</head>
<body>

<!-- Setup overlay (first time) -->
<div class="setup-overlay" id="setup-overlay">
  <div class="setup-box">
    <div style="font-size:36px;margin-bottom:12px;">🔗</div>
    <h2>CSC ID Search</h2>
    <p>Enter the API URL provided by your admin to connect to the live database.</p>
    <input class="setup-input" id="setup-url" type="url" placeholder="Paste API URL here"
      onkeydown="if(event.key==='Enter')saveSetup()">
    <button class="setup-btn" onclick="saveSetup()">Connect</button>
    <div class="setup-msg" id="setup-msg"></div>
  </div>
</div>

<!-- Header -->
<div class="header">
  <h1>CSC ID Search</h1>
  <p>State Team Portal — Live Database</p>
  <div class="conn-badge">
    <div class="conn-dot" id="conn-dot"></div>
    <span id="conn-text">Connecting...</span>
  </div>
</div>

<!-- Stats bar -->
<div class="stats-bar" id="stats-bar" style="display:none;">
  <div class="stat-item"><div class="stat-val" id="st-total">—</div><div class="stat-lbl">Total IDs</div></div>
  <div class="stat-item"><div class="stat-val" id="st-blocked" style="color:var(--danger);">—</div><div class="stat-lbl">Blocked</div></div>
  <div class="stat-item"><div class="stat-val" id="st-unblocked" style="color:var(--ok);">—</div><div class="stat-lbl">Unblocked</div></div>
  <div class="stat-item"><div class="stat-val" id="st-fraud" style="color:var(--danger);">—</div><div class="stat-lbl">Fraud</div></div>
  <div class="stat-item" style="font-size:10px;color:var(--text3);display:flex;align-items:center;justify-content:center;flex-direction:column;padding:8px;">
    <div style="font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;">Last Sync</div>
    <div id="st-sync" style="font-size:11px;color:var(--text2);margin-top:2px;">—</div>
  </div>
</div>

<!-- Search card -->
<div class="search-card">
  <select class="state-select" id="state-select" onchange="onStateChange()">
    <option value="">— Select Your State —</option>
  </select>
  <div class="search-row">
    <input class="sinp" id="sinp" type="text" placeholder="Enter CSC ID"
      inputmode="numeric" pattern="[0-9]*"
      oninput="this.value=this.value.replace(/\D/g,'')"
      onkeydown="if(event.key==='Enter')doSearch()">
    <button class="btn-search" onclick="doSearch()">Search</button>
  </div>
  <button class="btn-dl" id="btn-dl" disabled onclick="downloadStateData()">
    ⬇ Download My State's Data (Excel)
  </button>
</div>

<!-- Result area -->
<div class="result-area" id="result-area">
  <div class="empty">
    <svg width="48" height="48" fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="11" cy="11" r="7" stroke-width="1.5"/><path stroke-linecap="round" stroke-width="1.5" d="M21 21l-4.35-4.35"/></svg>
    <p>Select your state then enter a CSC ID to search</p>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
const API_KEY='csc_state_api_url';
let API_URL='';
let selectedState='';
let stateData=[];

// ── Init ───────────────────────────────────────────────────
window.addEventListener('load',async()=>{
  API_URL=localStorage.getItem(API_KEY)||'';
  if(API_URL){
    document.getElementById('setup-overlay').style.display='none';
    await init();
  }
});

async function saveSetup(){
  const url=document.getElementById('setup-url').value.trim();
  const msg=document.getElementById('setup-msg');
  if(!url){msg.textContent='Please paste the URL';msg.style.color='var(--danger)';return;}
  msg.textContent='⏳ Testing connection...';msg.style.color='var(--accent)';
  try{
    const res=await fetch(url+'?action=ping');
    const data=await res.json();
    if(data.ok){
      localStorage.setItem(API_KEY,url);
      API_URL=url;
      document.getElementById('setup-overlay').style.display='none';
      await init();
    } else {
      msg.textContent='✗ Connection failed: '+(data.error||'Unknown');msg.style.color='var(--danger)';
    }
  }catch(e){
    msg.textContent='✗ Cannot connect. Check URL.';msg.style.color='var(--danger)';
  }
}

async function init(){
  setConn('connecting');
  try{
    // Load stats
    const statsRes=await fetch(API_URL+'?action=stats');
    const statsData=await statsRes.json();
    if(statsData.ok){
      document.getElementById('stats-bar').style.display='flex';
      document.getElementById('st-total').textContent=(statsData.stats.BLOCKED||0).toLocaleString();
      const bl=statsData.stats.BLOCKED||0;
      const ub=0; // Will calculate from data
      document.getElementById('st-blocked').textContent=bl.toLocaleString();
      document.getElementById('st-unblocked').textContent=(statsData.stats.HISTORY||0).toLocaleString();
      document.getElementById('st-fraud').textContent=(statsData.stats.FRAUD||0).toLocaleString();
      document.getElementById('st-sync').textContent=statsData.lastSync||'—';
    }

    // Load states
    const statesRes=await fetch(API_URL+'?action=states');
    const statesData=await statesRes.json();
    if(statesData.ok&&statesData.states.length){
      const sel=document.getElementById('state-select');
      statesData.states.forEach(s=>{
        const opt=document.createElement('option');
        opt.value=s;opt.textContent=s;
        sel.appendChild(opt);
      });
      // Restore last selected state
      const lastState=localStorage.getItem('csc_state')||'';
      if(lastState){sel.value=lastState;selectedState=lastState;document.getElementById('btn-dl').disabled=false;}
    }
    setConn('online');
  }catch(e){
    setConn('offline');
  }
}

function setConn(status){
  const dot=document.getElementById('conn-dot');
  const txt=document.getElementById('conn-text');
  if(status==='online'){dot.className='conn-dot online';txt.textContent='Live';}
  else if(status==='offline'){dot.className='conn-dot offline';txt.textContent='Offline';}
  else{dot.className='conn-dot';txt.textContent='Connecting...';}
}

function onStateChange(){
  selectedState=document.getElementById('state-select').value;
  localStorage.setItem('csc_state',selectedState);
  document.getElementById('btn-dl').disabled=!selectedState;
  stateData=[];// Reset cached state data
}

// ── Search ─────────────────────────────────────────────────
async function doSearch(){
  const id=document.getElementById('sinp').value.trim();
  const area=document.getElementById('result-area');
  if(!id||id.length<6){
    area.innerHTML='<div class="empty"><p>Please enter a valid CSC ID (minimum 6 digits)</p></div>';
    return;
  }
  if(!selectedState){
    area.innerHTML='<div class="empty"><p>Please select your state first</p></div>';
    return;
  }
  area.innerHTML='<div class="loading"><div class="spin"></div><p>Searching...</p></div>';

  try{
    const res=await fetch(`${API_URL}?action=search&id=${encodeURIComponent(id)}`);
    const data=await res.json();
    if(!data.ok) throw new Error(data.error||'Search failed');
    renderResult(data.result, id);
  }catch(e){
    area.innerHTML=`<div class="empty"><p>Search failed: ${e.message}</p></div>`;
  }
}

function renderResult(r, id){
  const area=document.getElementById('result-area');
  if(!r||!r.found){
    area.innerHTML=`
    <div class="rcard">
      <div class="status-row">
        <div><div class="rid">${id}</div></div>
        <div class="bpill bp-notfound">Not Found in Database</div>
      </div>
      <p style="font-size:13px;color:var(--text2);">This CSC ID is not present in the blocked/unblocked database. It may be active or not yet registered.</p>
    </div>`;
    return;
  }

  const m=r.master||{};
  const h=r.history;
  const fr=r.fraud;
  const pm=r.perm;

  const isBlocked=m['Status']==='Blocked';
  const isFraud=!!fr;
  const statusLabel=isBlocked?(h?'Blocked → Sent for Unblocking':'Blocked'):'Unblocked';
  const statusClass=isBlocked?'bp-blocked':'bp-unblocked';

  let html=`
  <div class="rcard">
    <div class="status-row">
      <div>
        <div class="rid">${id}</div>
        <div class="rname">${m['VLE Name']||'—'}</div>
      </div>
      <div style="text-align:right;">
        <div class="bpill ${statusClass}">${statusLabel}</div>
        ${isFraud?'<div style="font-size:11px;color:var(--danger);font-weight:700;margin-top:5px;">🚨 FRAUD FLAGGED</div>':''}
        ${h?`<div style="font-size:11px;color:var(--ok);margin-top:4px;">✓ Sent for unblocking: <b>${h['Processed Date']||'—'}</b></div>`:''}
        ${pm?`<div style="font-size:11px;color:var(--warn);margin-top:4px;">⚠ Permanently Closed: <b>${pm['Sent Date']||'—'}</b></div>`:''}
      </div>
    </div>

    <div class="grid2" style="margin-bottom:8px;">
      <div class="field"><div class="fl">State</div><div class="fv">${m['State']||'—'}</div></div>
      <div class="field"><div class="fl">District</div><div class="fv">${m['District']||'—'}</div></div>
    </div>
    <div class="grid3">
      <div class="field"><div class="fl">Status</div><div class="fv"><span class="pill ${isBlocked?'pill-red':'pill-green'}">${m['Status Raw']||m['Status']||'—'}</span></div></div>
      <div class="field"><div class="fl">Unblock Date</div><div class="fv" style="font-size:11px;">${m['Unblock Date']||'—'}</div></div>
      <div class="field"><div class="fl">Unblock Type</div><div class="fv" style="font-size:11px;">${m['Unblock Type']||'—'}</div></div>
    </div>`;

  // Block reason
  if(isBlocked&&m['Remarks']){
    html+=`<div class="reason-box">
      <div class="reason-label">Reason for Blocking</div>
      <div class="reason-text">${m['Remarks']}</div>
    </div>`;
  }

  // Unblock history
  if(h){
    html+=`<div class="hist-box">
      <div class="hist-label">✓ Unblock Record</div>
      <div class="hist-text">Processed for unblocking on ${h['Processed Date']||'—'}</div>
    </div>`;
  }

  // Perm closed
  if(pm){
    html+=`<div class="reason-box" style="background:var(--warnl);border-color:#fcd34d;">
      <div class="reason-label" style="color:var(--warn);">Permanently Closed</div>
      <div class="reason-text" style="color:var(--warn);">${pm['Closed Reason']||'—'} — ${pm['Comments']||''}</div>
    </div>`;
  }
  html+='</div>';

  // Fraud card
  if(fr){
    html+=`<div class="rcard" style="border-color:var(--danger);">
      <div class="fraud-head">
        <svg width="18" height="18" fill="none" stroke="var(--danger)" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/></svg>
        <div class="fraud-title">Fraud Flag</div>
        <span class="pill pill-red" style="margin-left:auto;">🚨 Fraud ID</span>
      </div>
      <div class="grid2" style="margin-bottom:8px;">
        <div class="field"><div class="fl">Approved By</div><div class="fv">${fr['Approved By']||'—'}</div></div>
        <div class="field"><div class="fl">Approval Date</div><div class="fv">${fr['Approval Date']||'—'}</div></div>
      </div>
      <div class="field" style="margin-bottom:8px;"><div class="fl">Remarks</div><div class="fv" style="color:var(--warn);font-size:12px;white-space:normal;">${fr['Remarks']||'—'}</div></div>
      <div class="field"><div class="fl">App Description</div><div class="fv" style="font-size:12px;white-space:normal;">${fr['App Description']||'—'}</div></div>
    </div>`;
  }

  area.innerHTML=html;
}

// ── Download state data ────────────────────────────────────
async function downloadStateData(){
  if(!selectedState){alert('Please select your state first.');return;}
  const btn=document.getElementById('btn-dl');
  btn.disabled=true;btn.textContent='⏳ Loading state data...';
  try{
    const res=await fetch(`${API_URL}?action=state_data&state=${encodeURIComponent(selectedState)}`);
    const data=await res.json();
    if(!data.ok) throw new Error(data.error);
    if(!data.rows||!data.rows.length){alert('No data found for '+selectedState);return;}

    // Build Excel
    const wb=XLSX.utils.book_new();
    const ws=XLSX.utils.json_to_sheet(data.rows);
    ws['!cols']=[{wch:16},{wch:22},{wch:16},{wch:18},{wch:10},{wch:12},{wch:20},{wch:14},{wch:40},{wch:20}];
    XLSX.utils.book_append_sheet(wb,ws,selectedState.slice(0,31));
    const date=new Date().toISOString().slice(0,10);
    XLSX.writeFile(wb,`CSC_${selectedState.replace(/\s+/g,'_')}_${date}.xlsx`);
    btn.textContent=`✓ Downloaded (${data.count} IDs)`;
    setTimeout(()=>{btn.textContent='⬇ Download My State\'s Data (Excel)';btn.disabled=false;},3000);
  }catch(e){
    alert('Download failed: '+e.message);
    btn.disabled=false;
    btn.textContent='⬇ Download My State\'s Data (Excel)';
  }
}
</script>
</body>
</html>
